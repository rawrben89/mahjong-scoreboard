name: Auto Bump Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip if already a version-bump commit, or if package.json was changed in this push (already bumped locally)
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        run: node bump-version.js

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json index.html sw.js
          git diff --cached --quiet || git commit -m "chore: bump version to $(node -p \"require('./package.json').version\") [skip ci]"

      - name: Push
        run: git push
